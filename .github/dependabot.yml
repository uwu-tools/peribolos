version: 2
updates:
- package-ecosystem: "gomod"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
  groups:
    gomod:
      patterns:
        - "*"
      exclude-patterns:
        - "golang.org/x/*"
    golang-x:
      patterns:
        - "golang.org/x/*"
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
  groups:
    github-actions:
      patterns:
        - "*"
      exclude-patterns:
        - "actions/*"
        - "github/*"
        - "golangci/*"
    github-owned:
      patterns:
        - "actions/*"
        - "github/*"
    golangci:
      patterns:
        - "golangci/*"
